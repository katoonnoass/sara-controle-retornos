{% extends "base.html" %}
{% block title %}{{ 'Novo' if not edit else 'Editar' }} Usu?rio{% endblock %}
{% block content %}
<div class="card-sara">
    <div class="card-header">{{ ' Novo Usu?rio' if not edit else ' Editar - ' + record.usuario }}</div>
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label class="form-label-sm">Nome Completo *</label>
                    <input type="text" name="nome_completo" class="form-control form-control-sm" value="{{ record.nome_completo if record else '' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Nome de Exibi??o *</label>
                    <input type="text" name="nome_exibicao" class="form-control form-control-sm" value="{{ record.nome_exibicao if record else '' }}" required>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label class="form-label-sm">Setor *</label>
                    <select name="setor" class="form-select form-select-sm">
                        <option value="">Selecione...</option>
                        {% for s in ['LABORAT?RIO F?SICO QU?MICO','LABORAT?RIO MICROBIOL?GICO','COORDENA??O DE ESTUDOS','PESQUISA E DESENVOLVIMENTO','DESENVOLVIMENTO ANAL?TICO','GEST?O DE PROJETOS','DIRETORIA','TI','ADMINISTRATIVO'] %}
                        <option value="{{ s }}" {{ 'selected' if record and record.setor == s }}>{{ s }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Cargo *</label>
                    <select name="cargo" class="form-select form-select-sm">
                        {% for c in ['Administrador','Diretor','Diretora','Gerente','Coordenador','Coordenadora','Supervisor','Supervisora','Analista','Especialista','Operador'] %}
                        <option value="{{ c }}" {{ 'selected' if record and record.cargo == c }}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-md-6">
                    <label class="form-label-sm">Usu?rio (login) *</label>
                    <input type="text" name="usuario" class="form-control form-control-sm" value="{{ record.usuario if record else '' }}" {{ 'readonly' if edit }} required>
                </div>
                <div class="col-md-6">
                    <label class="form-label-sm">Senha * {{ '(deixe em branco para manter)' if edit else '' }}</label>
                    <input type="password" name="senha" class="form-control form-control-sm" value="" {{ '' if edit else 'required' }}>
                </div>
            </div>
            <div class="row g-2 mb-3">
                <div class="col-auto">
                    <label class="form-label-sm">Ativo:</label>
                    <div class="d-flex gap-3 mt-1">
                        <div class="form-check"><input class="form-check-input" type="radio" name="ativo" value="Sim" id="atvSim" {{ 'checked' if not record or record.ativo == 'Sim' }}><label class="form-check-label small" for="atvSim">Sim</label></div>
                        <div class="form-check"><input class="form-check-input" type="radio" name="ativo" value="N?o" id="atvNao" {{ 'checked' if record and record.ativo == 'N?o' }}><label class="form-check-label small" for="atvNao">N?o</label></div>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-sm">Observa??es</label>
                <input type="text" name="observacoes" class="form-control form-control-sm" value="{{ record.observacoes if record else '' }}">
            </div>
            <hr>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary"> Salvar Usu?rio</button>
                <a href="{{ url_for('admin.usuarios') }}" class="btn btn-outline-secondary"> Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
