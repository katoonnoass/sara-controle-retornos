<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #F2F4F8; font-family: 'Segoe UI', system-ui, sans-serif; }
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.1); width: 420px; overflow: hidden; }
        .login-header { background: #4472C4; padding: 28px 32px 20px; text-align: center; }
        .login-header h1 { color: #fff; font-size: 28px; font-weight: 700; margin: 0; }
        .login-header p { color: #A8C4E8; font-size: 12px; margin: 4px 0 0; }
        .login-separator { height: 4px; background: #4472C4; }
        .login-body { padding: 32px; }
        .login-body h5 { color: #1E2D40; font-weight: 600; margin-bottom: 4px; }
        .login-body p.sub { color: #6B7A8D; font-size: 12px; margin-bottom: 16px; }
        .form-control:focus { border-color: #4472C4; box-shadow: 0 0 0 0.2rem rgba(68,114,196,.25); }
        .btn-primary { background: #4472C4; border: none; padding: 10px; font-weight: 600; }
        .btn-primary:hover { background: #3a62b0; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>{{ app_name }}</h1>
                <p>{{ app_subtitle }}</p>
            </div>
            <div class="login-separator"></div>
            <div class="login-body">
                <h5>Acesse sua conta</h5>
                <p class="sub">Informe suas credenciais para continuar</p>
                {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show py-2 px-3 small" style="border:none;">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <hr class="my-3">

                <form method="POST" action="{{ url_for('auth.login') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label small text-muted">Usuario</label>
                        <input type="text" name="usuario" class="form-control" placeholder="nome.sobrenome" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted">Senha</label>
                        <input type="password" name="senha" class="form-control" placeholder="********" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar ></button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">v{{ app_version }}</small>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
